<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TERMINAL_B.R.</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Share+Tech+Mono&display=swap');

  :root {
    --primary: #c8b97a;
    --dim: #333024;
    --dim2: #4a4530;
    --bg: #050505;
    --glow: rgba(200, 185, 122, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    color: var(--primary);
    filter: brightness(0.9);
  }

  .crt-overlay {
    position: fixed; inset: 0;
    background:
      linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.1) 50%),
      linear-gradient(90deg, rgba(255,0,0,0.03), rgba(0,255,0,0.01), rgba(0,0,255,0.03));
    background-size: 100% 3px, 2px 100%;
    z-index: 100; pointer-events: none;
    animation: flicker 0.15s infinite;
  }
  @keyframes flicker { 0% { opacity: 0.97; } 100% { opacity: 1; } }

  .vignette {
    position: fixed; inset: 0;
    background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.95));
    pointer-events: none; z-index: 90;
  }

  .scan-flash {
    position: fixed; inset: 0;
    background: linear-gradient(transparent 50%, rgba(200,185,122,0.015) 50%);
    background-size: 100% 4px;
    z-index: 80; pointer-events: none;
    animation: scanMove 8s linear infinite;
  }
  @keyframes scanMove { from { background-position: 0 0; } to { background-position: 0 100vh; } }

  .wrap {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; gap: 18px;
    width: 90%; max-width: 540px;
    padding: 30px;
    border-left: 2px solid var(--dim);
    max-height: 96vh; overflow-y: auto; scrollbar-width: none;
  }
  .wrap::-webkit-scrollbar { display: none; }

  .header {
    font-size: 10px; letter-spacing: 2px; color: var(--dim);
    display: flex; justify-content: space-between;
    border-bottom: 1px solid var(--dim); padding-bottom: 5px;
  }

  .boot-msg { font-size: 10px; color: var(--dim2); letter-spacing: 1px; }

  .section-label { font-size: 9px; letter-spacing: 4px; color: var(--dim2); text-transform: uppercase; }

  .enigma-plain {
    font-family: 'Fira Code', monospace;
    font-size: 13px; line-height: 2.1; color: #e8e0d0;
    letter-spacing: 0.5px;
    border-left: 1px solid var(--dim); padding-left: 16px;
  }

  /* ── YouTube link box ── */
  .yt-block {
    display: flex;
    align-items: center;
    gap: 14px;
    border: 1px solid var(--dim);
    padding: 14px 16px;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.4s, box-shadow 0.4s;
    opacity: 0;
    animation: fadeIn 1.2s ease 1s forwards;
  }
  .yt-block:hover {
    border-color: var(--primary);
    box-shadow: 0 0 10px var(--glow);
  }

  .yt-icon {
    font-size: 20px;
    color: var(--primary);
    opacity: 0.7;
    flex-shrink: 0;
  }

  .yt-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .yt-name {
    font-size: 11px;
    letter-spacing: 3px;
    color: #e8e0d0;
  }

  .yt-meta {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--dim2);
  }

  .yt-arrow {
    margin-left: auto;
    font-size: 14px;
    color: var(--dim2);
    transition: color 0.3s, transform 0.3s;
  }
  .yt-block:hover .yt-arrow { color: var(--primary); transform: translateX(3px); }

  .sep { border: none; border-top: 1px solid var(--dim); opacity: 0.4; }

  .input-area {
    display: flex; flex-direction: column; gap: 10px;
    opacity: 0;
    animation: fadeIn 1s ease 1.6s forwards;
  }

  .input-row {
    display: flex; align-items: center;
    background: rgba(0,0,0,0.4);
  }

  .prefix {
    padding-right: 15px; color: var(--primary); font-size: 18px;
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  input[type="text"] {
    flex: 1; background: transparent; border: none; outline: none;
    color: #e8e0d0; font-family: 'Fira Code', monospace;
    font-size: 14px; letter-spacing: 5px; text-transform: uppercase;
  }

  button {
    background: transparent; border: 1px solid var(--dim);
    color: var(--dim); font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 4px; padding: 10px;
    cursor: crosshair; transition: all 0.5s;
  }
  button:hover {
    color: var(--primary); border-color: var(--primary);
    box-shadow: 0 0 10px var(--glow);
  }

  .status-msg { font-size: 10px; height: 14px; color: var(--dim); }

  /* signature */
  .signature {
    font-family: 'Fira Code', monospace;
    font-size: 13px; letter-spacing: 6px;
    color: var(--primary);
    border-top: 1px solid var(--dim);
    padding-top: 12px;
    opacity: 0;
    animation: fadeIn 1s ease 2s forwards;
  }

  .qr-link {
    font-size: 9px; letter-spacing: 3px; color: var(--dim2);
    text-align: right; cursor: crosshair; text-decoration: none;
    transition: color 0.3s;
    opacity: 0; animation: fadeIn 1s ease 2.2s forwards;
  }
  .qr-link:hover { color: var(--primary); }

  .footer {
    font-size: 9px; letter-spacing: 2px; color: var(--dim);
    display: flex; justify-content: space-between;
    border-top: 1px solid var(--dim); padding-top: 5px;
    opacity: 0; animation: fadeIn 1s ease 2.2s forwards;
  }

  /* success */
  .success-screen {
    position: fixed; inset: 0; background: #000;
    z-index: 200; display: none;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 20px;
  }
  #typewriter {
    font-size: 18px; letter-spacing: 8px; color: var(--primary);
    text-transform: uppercase; text-shadow: 0 0 15px var(--primary);
  }
  #piece-notice {
    font-size: 10px; letter-spacing: 4px; color: var(--dim2);
    opacity: 0; transition: opacity 1s ease 1s;
  }
  #piece-notice.visible { opacity: 1; }

  .glitch-flash { animation: flash 0.2s steps(2) infinite; }
  @keyframes flash { 0% { background: var(--primary); opacity: 0.1; } 100% { background: transparent; } }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .cursor {
    display: inline-block; width: 8px; height: 13px;
    background: var(--primary); vertical-align: middle; margin-left: 4px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  /* ── Decode chars ── */
  .char { display: inline; color: var(--dim2); }
  .char.decoded { color: #e8e0d0; }
  .char.decoding {
    color: var(--primary);
    animation: glitchChar 0.12s steps(2) forwards;
  }
  @keyframes glitchChar {
    0%   { opacity: 0.3; }
    50%  { opacity: 1; }
    100% { opacity: 1; }
  }
</style>
</head>
<body>

<div class="crt-overlay"></div>
<div class="scan-flash"></div>
<div class="vignette"></div>

<div class="wrap" id="main-ui">

  <div class="header">
    <span>FILE_ID: PUZZLE_04</span>
    <span id="clock">--:--:--</span>
  </div>

  <div class="boot-msg" id="boot-msg">SIGNAL_ACQUIRED...</div>
  <div class="section-label">> INTERCEPTED_TRANSMISSION</div>

  <div class="enigma-plain"></div>

  <!-- ── YouTube box — sostituisci YOUR_YOUTUBE_URL ── -->
  <a class="yt-block" href="YOUR_YOUTUBE_URL" target="_blank">
    <div class="yt-icon">▶</div>
    <div class="yt-info">
      <div class="yt-name">VIDEO_SIGNAL.MP4</div>
      <div class="yt-meta">SOURCE: ENCRYPTED_CHANNEL // OPEN TO PROCEED</div>
    </div>
    <div class="yt-arrow">→</div>
  </a>

  <hr class="sep">

  <div class="input-area">
    <div class="input-row">
      <span class="prefix">></span>
      <input type="text" id="ans" placeholder="PASS" autocomplete="off" spellcheck="false" />
    </div>
    <button onclick="check()">VALIDATE_IDENTITY</button>
  </div>

  <div class="status-msg" id="msg"></div>

  <div class="signature">0168</div>

  <a class="qr-link" href="qr.html">[ VIEW_SIGNAL_PROGRESS ]</a>

  <div class="footer">
    <span>KEY_ID: 0x0168</span>
    <span id="node">NODE: --</span>
  </div>

</div>

<div class="success-screen" id="success">
  <div id="typewriter"></div>
  <div id="piece-notice">// FRAGMENT_04 SAVED //</div>
</div>

<script>
  const PIECE_NUMBER  = 4;
  const SOLUTION_HASH = "d57f5b36eb1838c8e33cc12bf02838c622fa437fe8fdbbba05ee93982ff00c08";
  const NEXT_URL      = "fine.html";
  const SUCCESS_TEXT  = "you found us.";
  const REDIRECT_DELAY = 5000;
  const STORAGE_KEY   = "br_qr_unlocked";

  function updateClock() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('en-GB', { hour12: false });
  }
  setInterval(updateClock, 1000);
  updateClock();

  const logs = [
    "SIGNAL_ACQUIRED...", "DECRYPT_X64_CORE... OK",
    "FINAL_SEQUENCE_DETECTED", "LISTENING...",
    "BREACH_PROTOCOL_ACTIVE", "LAST_FRAGMENT_NEAR"
  ];
  setInterval(() => {
    if (Math.random() > 0.8)
      document.getElementById('boot-msg').textContent =
        logs[Math.floor(Math.random() * logs.length)];
  }, 3000);

  document.getElementById('node').textContent =
    'NODE: ' + Math.random().toString(16).slice(2,8).toUpperCase();

  async function sha256(str) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
  }

  function typeWriter(text, id, speed = 200) {
    let i = 0;
    const el = document.getElementById(id);
    function type() {
      if (i < text.length) { el.textContent += text.charAt(i); i++; setTimeout(type, speed); }
    }
    type();
  }

  function unlockPiece(n) {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      if (!saved.includes(n)) { saved.push(n); localStorage.setItem(STORAGE_KEY, JSON.stringify(saved)); }
    } catch(e) {}
  }

  async function check() {
    const val  = document.getElementById('ans').value.trim().toUpperCase();
    const msg  = document.getElementById('msg');
    const hash = await sha256(val);

    if (hash === SOLUTION_HASH) {
      unlockPiece(PIECE_NUMBER);
      document.body.classList.add('glitch-flash');

      setTimeout(() => {
        document.getElementById('main-ui').style.display = 'none';
        document.getElementById('success').style.display = 'flex';
        document.body.classList.remove('glitch-flash');

        setTimeout(() => {
          typeWriter(SUCCESS_TEXT, "typewriter", 250);
          setTimeout(() => document.getElementById('piece-notice').classList.add('visible'), 1000);
          setTimeout(() => { window.location.href = NEXT_URL; }, REDIRECT_DELAY);
        }, 500);
      }, 500);

    } else {
      document.getElementById('ans').value = '';
      msg.style.color = '#5e1111';
      msg.textContent = '>> ERROR: UNAUTHORIZED_BREACH_DETECTED';
      setTimeout(() => { msg.textContent = ''; }, 2000);
    }
  }

  document.getElementById('ans').addEventListener('keydown', e => {
    if (e.key === 'Enter') check();
  });

  // ── Decode animation ──
  function startDecode(blockId, cipherText, plainText, initialDelay, charDelay) {
    initialDelay = initialDelay || 1200;
    charDelay = charDelay || 38;
    const block = document.getElementById(blockId);
    block.innerHTML = '';
    for (let i = 0; i < cipherText.length; i++) {
      if (cipherText[i] === '\n') {
        block.appendChild(document.createElement('br'));
      } else {
        const span = document.createElement('span');
        span.className = 'char';
        span.textContent = cipherText[i];
        span.dataset.plain = plainText[i] !== undefined ? plainText[i] : cipherText[i];
        block.appendChild(span);
      }
    }
    const spans = block.querySelectorAll('.char');
    let i = 0;
    function decodeNext() {
      if (i >= spans.length) return;
      const span = spans[i];
      span.classList.add('decoding');
      span.textContent = span.dataset.plain;
      setTimeout(function() {
        span.classList.remove('decoding');
        span.classList.add('decoded');
        i++;
        decodeNext();
      }, charDelay);
    }
    setTimeout(decodeNext, initialDelay);
  }

  


  /* ── DECODE ANIMATION ── */
  (function() {
    const CHAR_DELAY = 65;
    const cipher = "Lw hqgv wkh zdb lw vwduwhg.\nWklv lv brxu ilqdo foxh.\nWkh iluvw vwhs wr brxu vroxwlrq.\nBrx glgq'w qrwlfh. Brx eolqnhg.\nJr edfn wr wkh ylghr. Wkh wuxwk lv zdlwlqj.\nEhiruh brx phhw ph,\n\nJrrg oxfn.";
    const plain  = "It ends the way it started.\nThis is your final clue.\nThe first step to your solution.\nYou didn't notice. You blinked.\nGo back to the video. The truth is waiting.\nBefore you meet me,\n\nGood luck.";
    const block  = document.querySelector('.enigma-plain');
    if (!block) return;

    // Build spans from cipher text
    block.innerHTML = '';
    const spans = [];
    for (let i = 0; i < cipher.length; i++) {
      if (cipher[i] === '\n') {
        block.appendChild(document.createElement('br'));
      } else {
        const span = document.createElement('span');
        span.className = 'char';
        span.textContent = cipher[i];
        block.appendChild(span);
        spans.push({ span, target: plain[i] || cipher[i], isLetter: /[a-zA-Z]/.test(cipher[i]) });
      }
    }

    // Cursor
    const cur = document.createElement('span');
    cur.className = 'cursor';
    block.appendChild(cur);

    // Decode
    let i = 0;
    function decodeNext() {
      while (i < spans.length && !spans[i].isLetter) {
        spans[i].span.classList.add('decoded');
        i++;
      }
      if (i >= spans.length) return;
      const { span, target } = spans[i];
      span.classList.add('decoding');
      span.textContent = target;
      setTimeout(() => {
        span.classList.remove('decoding');
        span.classList.add('decoded');
        i++;
        setTimeout(decodeNext, CHAR_DELAY);
      }, CHAR_DELAY / 2);
    }
    setTimeout(decodeNext, 1000);
  })();

</script>

</body>
</html>
