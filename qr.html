<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TERMINAL_B.R.</title>
  <link rel="stylesheet" href="terminal.css">
  <style>
    /* qr.html ha wrap più stretto e senza scroll */
    .wrap { max-width: 420px; max-height: none; overflow-y: visible; }

    /* ── QR container ── */
    .qr-container {
      width: 280px; height: 280px;
      margin: 0 auto;
      position: relative;
      border: 1px solid var(--dim);
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    #qr-canvas {
      display: block; width: 280px; height: 280px;
      image-rendering: pixelated;
    }

    .qr-shield {
      position: absolute; inset: 0;
      z-index: 10;
      -webkit-touch-callout: none;
    }

    /* Linee divisorie tra quadranti */
    .qr-grid-lines { position: absolute; inset: 0; z-index: 5; pointer-events: none; }
    .qr-grid-lines::before {
      content: ''; position: absolute;
      top: 0; bottom: 0; left: 50%; width: 1px;
      background: var(--bg); opacity: 0; transition: opacity 0.5s;
    }
    .qr-grid-lines::after {
      content: ''; position: absolute;
      left: 0; right: 0; top: 50%; height: 1px;
      background: var(--bg); opacity: 0; transition: opacity 0.5s;
    }
    .qr-grid-lines.partial::before,
    .qr-grid-lines.partial::after { opacity: 1; }

    /* Overlay locked per ogni quadrante */
    .quad-lock {
      position: absolute; width: 50%; height: 50%;
      z-index: 6;
      display: flex; align-items: center; justify-content: center;
      background: repeating-linear-gradient(
        45deg,
        rgba(5,5,5,0.92), rgba(5,5,5,0.92) 2px,
        rgba(50,48,36,0.3) 2px, rgba(50,48,36,0.3) 8px
      );
      font-size: 8px; letter-spacing: 2px; color: var(--dim2);
      transition: opacity 0.6s ease;
    }
    .quad-lock[data-q="1"] { top: 0;   left: 0;   }
    .quad-lock[data-q="2"] { top: 0;   left: 50%; }
    .quad-lock[data-q="3"] { top: 50%; left: 0;   }
    .quad-lock[data-q="4"] { top: 50%; left: 50%; }
    .quad-lock.unlocked    { opacity: 0; pointer-events: none; }
    .quad-lock.revealing   { animation: glitchFlash 0.6s steps(2) forwards; }

    @keyframes glitchFlash {
      0%   { opacity: 0.2; }
      25%  { opacity: 0.8; }
      50%  { opacity: 0.1; }
      75%  { opacity: 0.9; }
      100% { opacity: 0;   }
    }

    /* Progress bar */
    .progress-row {
      display: flex; align-items: center; gap: 10px;
      font-size: 9px; letter-spacing: 3px; color: var(--dim2);
    }
    .progress-bar  { flex: 1; height: 2px; background: var(--dim); overflow: hidden; }
    .progress-fill {
      height: 100%; background: var(--primary); width: 0%;
      transition: width 1.2s ease; box-shadow: 0 0 6px var(--primary);
    }

    .status-msg {
      font-size: 10px; color: var(--dim2); letter-spacing: 1px;
      min-height: 14px; text-align: center;
    }
    .status-msg.new-unlock {
      color: var(--primary); text-shadow: 0 0 8px var(--glow);
      animation: pulseTxt 1s ease 3;
    }
    @keyframes pulseTxt { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .complete-msg {
      display: none; text-align: center;
      font-size: 10px; letter-spacing: 4px;
      color: var(--primary); text-transform: uppercase;
      text-shadow: 0 0 12px var(--glow);
      animation: pulseTxt 2s ease infinite;
    }
  </style>
</head>
<body>

<div class="crt-overlay"></div>
<div class="scan-flash"></div>
<div class="vignette"></div>

<div class="wrap">

  <div class="header">
    <span>FILE_ID: QR_MATRIX</span>
    <span id="clock">--:--:--</span>
  </div>

  <div class="boot-msg" id="boot-msg">DECRYPTING_FRAGMENT...</div>
  <div class="section-label">> REBUILD THE SIGNAL</div>

  <div class="qr-container" id="qr-container">
    <canvas id="qr-canvas" width="280" height="280"></canvas>
    <div class="qr-grid-lines partial" id="grid-lines"></div>
    <div class="quad-lock" data-q="1">LOCKED</div>
    <div class="quad-lock" data-q="2">LOCKED</div>
    <div class="quad-lock" data-q="3">LOCKED</div>
    <div class="quad-lock" data-q="4">LOCKED</div>
    <div class="qr-shield" id="qr-shield"></div>
  </div>

  <div class="progress-row">
    <span id="progress-label">0/4</span>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <span>FRAGMENTS</span>
  </div>

  <div class="status-msg" id="status-msg"></div>
  <div class="complete-msg" id="complete-msg">// SIGNAL RESTORED //</div>

  <div class="footer">
    <span>KEY_ID: 0x0168</span>
    <span id="node">NODE: --</span>
  </div>

</div>

<script src="terminal.js"></script>
<script>
  const PIECE_MESSAGES = {
    1: "FRAGMENT_1 DECRYPTED",
    2: "FRAGMENT_2 DECRYPTED",
    3: "FRAGMENT_3 DECRYPTED",
    4: "FRAGMENT_4 DECRYPTED — SIGNAL COMPLETE",
  };
  const QR_SRC = "assets/finalsolution.png";

  startBootMsgLoop([
    "DECRYPTING_FRAGMENT...", "SIGNAL_PARTIAL...",
    "REASSEMBLING_MATRIX...", "LISTENING...", "DATA_FRAGMENT_RECOVERED"
  ]);

  /* ── Blocca context menu e long-press ── */
  const shield    = document.getElementById('qr-shield');
  const container = document.getElementById('qr-container');
  ['contextmenu', 'dragstart', 'selectstart'].forEach(ev => {
    container.addEventListener(ev, e => e.preventDefault());
    shield.addEventListener(ev, e => e.preventDefault());
  });
  let pressTimer;
  shield.addEventListener('touchstart', e => {
    pressTimer = setTimeout(() => e.preventDefault(), 300);
  }, { passive: false });
  shield.addEventListener('touchend', () => clearTimeout(pressTimer));

  /* ── Canvas ── */
  const canvas = document.getElementById('qr-canvas');
  const ctx    = canvas.getContext('2d');
  const img    = new Image();
  img.crossOrigin = 'anonymous';
  img.src = QR_SRC;

  let unlockedPieces = [];

  img.onload = () => drawCanvas(unlockedPieces);

  function drawCanvas(unlocked) {
    const W = 280, H = 280;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#050505';
    ctx.fillRect(0, 0, W, H);

    const iW = img.naturalWidth;
    const iH = img.naturalHeight;

    const quadrants = [
      { piece: 1, sx: 0,   sy: 0,   dx: 0,   dy: 0   },
      { piece: 2, sx: W/2, sy: 0,   dx: W/2, dy: 0   },
      { piece: 3, sx: 0,   sy: H/2, dx: 0,   dy: H/2 },
      { piece: 4, sx: W/2, sy: H/2, dx: W/2, dy: H/2 },
    ];

    quadrants.forEach(({ piece, sx, sy, dx, dy }) => {
      if (!unlocked.includes(piece)) return;
      ctx.drawImage(img, sx/W*iW, sy/H*iH, iW/2, iH/2, dx, dy, W/2, H/2);

      // Tinta gold
      const imageData = ctx.getImageData(dx, dy, W/2, H/2);
      const data = imageData.data;
      for (let i = 0; i < data.length; i += 4) {
        const gray = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
        const inv  = 255 - gray;
        data[i]   = Math.min(255, inv * 0.784);
        data[i+1] = Math.min(255, inv * 0.725);
        data[i+2] = Math.min(255, inv * 0.478);
      }
      ctx.putImageData(imageData, dx, dy);
    });
  }

  /* ── Storage ── */
  function getSaved() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
  }
  function save(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }

  function getPieceFromURL() {
    const n = parseInt(new URLSearchParams(window.location.search).get('piece'));
    return (n >= 1 && n <= 4) ? n : null;
  }

  /* ── Sblocca quadrante ── */
  function unlockQuad(n, animate) {
    const lock = document.querySelector(`.quad-lock[data-q="${n}"]`);
    if (!lock || lock.classList.contains('unlocked')) return;
    if (animate) {
      lock.classList.add('revealing');
      setTimeout(() => {
        lock.classList.remove('revealing');
        lock.classList.add('unlocked');
        drawCanvas(unlockedPieces);
      }, 650);
    } else {
      lock.classList.add('unlocked');
    }
  }

  /* ── Aggiorna progress bar ── */
  function updateProgress(unlocked) {
    const count = unlocked.length;
    document.getElementById('progress-label').textContent = `${count}/4`;
    setTimeout(() => {
      document.getElementById('progress-fill').style.width = `${(count / 4) * 100}%`;
    }, 300);

    if (count >= 4) {
      document.getElementById('grid-lines').classList.remove('partial');
      setTimeout(() => {
        document.getElementById('complete-msg').style.display = 'block';
        document.getElementById('status-msg').style.display   = 'none';
      }, 1200);
    }
  }

  /* ── Main ── */
  window.addEventListener('load', () => {
    unlockedPieces = getSaved();
    const newPiece = getPieceFromURL();

    unlockedPieces.forEach(n => unlockQuad(n, false));
    if (img.complete) drawCanvas(unlockedPieces);

    if (newPiece && !unlockedPieces.includes(newPiece)) {
      setTimeout(() => {
        unlockedPieces.push(newPiece);
        save(unlockedPieces);
        unlockQuad(newPiece, true);
        updateProgress(unlockedPieces);
        const msg = document.getElementById('status-msg');
        msg.textContent = `>> ${PIECE_MESSAGES[newPiece]}`;
        msg.className   = 'status-msg new-unlock';
      }, 800);
    } else {
      updateProgress(unlockedPieces);
      if (unlockedPieces.length > 0 && unlockedPieces.length < 4) {
        const n = unlockedPieces.length;
        document.getElementById('status-msg').textContent =
          `>> ${n} FRAGMENT${n > 1 ? 'S' : ''} RECOVERED`;
      }
    }

    if (newPiece) window.history.replaceState({}, '', window.location.pathname);
  });
</script>

</body>
</html>
