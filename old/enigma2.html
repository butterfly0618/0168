<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TERMINAL_B.R.</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Share+Tech+Mono&display=swap');

  :root {
    --primary: #c8b97a;
    --dim: #333024;
    --dim2: #4a4530;
    --bg: #050505;
    --glow: rgba(200, 185, 122, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    color: var(--primary);
    filter: brightness(0.9);
  }

  .crt-overlay {
    position: fixed; inset: 0;
    background:
      linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.1) 50%),
      linear-gradient(90deg, rgba(255,0,0,0.03), rgba(0,255,0,0.01), rgba(0,0,255,0.03));
    background-size: 100% 3px, 2px 100%;
    z-index: 100; pointer-events: none;
    animation: flicker 0.15s infinite;
  }
  @keyframes flicker { 0% { opacity: 0.97; } 100% { opacity: 1; } }

  .vignette {
    position: fixed; inset: 0;
    background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.95));
    pointer-events: none; z-index: 90;
  }

  .scan-flash {
    position: fixed; inset: 0;
    background: linear-gradient(transparent 50%, rgba(200,185,122,0.015) 50%);
    background-size: 100% 4px;
    z-index: 80; pointer-events: none;
    animation: scanMove 8s linear infinite;
  }
  @keyframes scanMove { from { background-position: 0 0; } to { background-position: 0 100vh; } }

  .wrap {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; gap: 18px;
    width: 90%; max-width: 540px;
    padding: 30px;
    border-left: 2px solid var(--dim);
    max-height: 96vh; overflow-y: auto; scrollbar-width: none;
  }
  .wrap::-webkit-scrollbar { display: none; }

  .header {
    font-size: 10px; letter-spacing: 2px; color: var(--dim);
    display: flex; justify-content: space-between;
    border-bottom: 1px solid var(--dim); padding-bottom: 5px;
  }

  .boot-msg { font-size: 10px; color: var(--dim2); letter-spacing: 1px; }

  .section-label {
    font-size: 9px; letter-spacing: 4px;
    color: var(--dim2); text-transform: uppercase;
  }

  /* ── Enigma text ── */
  .enigma-plain {
    font-family: 'Fira Code', monospace;
    font-size: 13px; line-height: 2; color: #e8e0d0;
    letter-spacing: 0.5px;
    border-left: 1px solid var(--dim); padding-left: 16px;
  }

  /* ── Image ── */
  .img-block {
    opacity: 0;
    animation: fadeIn 1.2s ease 1s forwards;
  }
  .enigma-image {
    width: 100%; max-height: 260px;
    object-fit: cover;
    filter: grayscale(0.15) brightness(0.8) contrast(1.1);
    border: 1px solid var(--dim);
    display: block;
    cursor: crosshair;
  }
  .image-caption {
    font-size: 9px; letter-spacing: 3px;
    color: var(--dim2); text-align: right; margin-top: 4px;
  }

  .sep { border: none; border-top: 1px solid var(--dim); opacity: 0.4; }

  /* ── Input ── */
  .input-area {
    display: flex; flex-direction: column; gap: 10px;
    opacity: 0;
    animation: fadeIn 1s ease 1.6s forwards;
  }

  .input-row {
    display: flex; align-items: center;
    background: rgba(0,0,0,0.4);
  }

  .prefix {
    padding-right: 15px; color: var(--primary); font-size: 18px;
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  input[type="text"] {
    flex: 1; background: transparent; border: none; outline: none;
    color: #e8e0d0; font-family: 'Fira Code', monospace;
    font-size: 14px; letter-spacing: 5px; text-transform: uppercase;
  }

  button {
    background: transparent; border: 1px solid var(--dim);
    color: var(--dim); font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 4px; padding: 10px;
    cursor: crosshair; transition: all 0.5s;
  }
  button:hover {
    color: var(--primary); border-color: var(--primary);
    box-shadow: 0 0 10px var(--glow);
  }

  .status-msg { font-size: 10px; height: 14px; color: var(--dim); }

  .qr-link {
    font-size: 9px; letter-spacing: 3px; color: var(--dim2);
    text-align: right; cursor: crosshair; text-decoration: none;
    transition: color 0.3s;
    opacity: 0; animation: fadeIn 1s ease 2s forwards;
  }
  .qr-link:hover { color: var(--primary); }

  .footer {
    font-size: 9px; letter-spacing: 2px; color: var(--dim);
    display: flex; justify-content: space-between;
    border-top: 1px solid var(--dim); padding-top: 5px;
    opacity: 0; animation: fadeIn 1s ease 2s forwards;
  }

  /* ── Success ── */
  .success-screen {
    position: fixed; inset: 0; background: #000;
    z-index: 200; display: none;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 20px;
  }
  #typewriter {
    font-size: 18px; letter-spacing: 8px; color: var(--primary);
    text-transform: uppercase; text-shadow: 0 0 15px var(--primary);
  }
  #piece-notice {
    font-size: 10px; letter-spacing: 4px; color: var(--dim2);
    opacity: 0; transition: opacity 1s ease 1s;
  }
  #piece-notice.visible { opacity: 1; }

  .glitch-flash { animation: flash 0.2s steps(2) infinite; }
  @keyframes flash { 0% { background: var(--primary); opacity: 0.1; } 100% { background: transparent; } }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .cursor {
    display: inline-block; width: 8px; height: 13px;
    background: var(--primary); vertical-align: middle; margin-left: 4px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  /* ── Decode chars ── */
  .char { display: inline; color: var(--dim2); }
  .char.decoded { color: #e8e0d0; }
  .char.decoding {
    color: var(--primary);
    animation: glitchChar 0.12s steps(2) forwards;
  }
  @keyframes glitchChar {
    0%   { opacity: 0.3; }
    50%  { opacity: 1; }
    100% { opacity: 1; }
  }

  /* ── Lightbox ── */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 300;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 30px;
  }
  .lightbox.active { display: flex; }

  .lightbox-img {
    max-width: 90vw;
    max-height: 65vh;
    object-fit: contain;
    border: 1px solid var(--dim);
    opacity: 0;
  }
  .lightbox-img.glitch-reveal {
    animation: lbGlitch 0.9s steps(1) forwards;
  }
  @keyframes lbGlitch {
    0%   { opacity: 0.1; filter: brightness(0) invert(1); clip-path: inset(90% 0 0 0); }
    10%  { opacity: 0.5; filter: brightness(3) hue-rotate(90deg); clip-path: inset(70% 0 0 0); }
    20%  { opacity: 0.2; filter: brightness(0) invert(1); clip-path: inset(50% 0 0 0); }
    35%  { opacity: 0.7; filter: brightness(2) sepia(1); clip-path: inset(30% 0 0 0); }
    50%  { opacity: 0.4; filter: brightness(0) invert(1); clip-path: inset(15% 0 0 0); }
    70%  { opacity: 0.9; filter: brightness(1.3); clip-path: inset(5% 0 0 0); }
    85%  { opacity: 1;   filter: brightness(0) invert(1); clip-path: inset(0); }
    100% { opacity: 1;   filter: brightness(0.8) contrast(1.1); clip-path: inset(0); }
  }

  .lightbox-caption {
    font-size: 9px; letter-spacing: 3px;
    color: var(--dim2); text-align: center;
  }

  .lightbox-actions {
    display: flex; gap: 12px;
  }

  .lb-btn {
    background: transparent;
    border: 1px solid var(--dim);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; letter-spacing: 3px;
    padding: 8px 14px;
    cursor: crosshair;
    transition: all 0.4s;
    text-decoration: none;
    display: inline-block;
  }
  .lb-btn:hover {
    color: var(--primary);
    border-color: var(--primary);
    box-shadow: 0 0 10px var(--glow);
  }
</style>
</head>
<body>

<div class="crt-overlay"></div>
<div class="scan-flash"></div>
<div class="vignette"></div>

<div class="wrap" id="main-ui">

  <div class="header">
    <span>FILE_ID: PUZZLE_02</span>
    <span id="clock">--:--:--</span>
  </div>

  <div class="boot-msg" id="boot-msg">SIGNAL_ACQUIRED...</div>

  <div class="section-label">> INTERCEPTED_TRANSMISSION</div>

  <div class="enigma-plain"></div>

  <!-- ── Image trigger button ── -->
  <button class="access-btn" id="img-btn" onclick="openImage()">
    >> OPEN_ATTACHED_FILE
  </button>

  <hr class="sep">

  <div class="input-area">
    <div class="input-row">
      <span class="prefix">></span>
      <input type="text" id="ans" placeholder="PASS" autocomplete="off" spellcheck="false" />
    </div>
    <button onclick="check()">VALIDATE_IDENTITY</button>
  </div>

  <div class="status-msg" id="msg"></div>

  <!-- ── Signature ── -->
  <div style="font-family:'Fira Code',monospace; font-size:10px; letter-spacing:2px; color:var(--dim2); border-top: 1px solid var(--dim); padding-top:12px; line-height:1.8; opacity:0; animation: fadeIn 1s ease 2s forwards;">
    
    <div style="color:var(--primary);font-size:13px;letter-spacing:6px;">0168</div>
    
  </div>

  <a class="qr-link" href="qr.html">[ VIEW_SIGNAL_PROGRESS ]</a>

  <div class="footer">
    <span>KEY_ID: 0x0168</span>
    <span id="node">NODE: --</span>
  </div>

</div>

<div class="success-screen" id="success">
  <div id="typewriter"></div>
  <div id="piece-notice">// FRAGMENT_02 SAVED //</div>
</div>

<script>
  const PIECE_NUMBER  = 2;
  const SOLUTION_HASH = "8d82487504e84435e074a7e13f2eb3969d908ecc243af6578e17ff7a9a01c13f";
  const NEXT_URL      = "enigma3.html";
  const SUCCESS_TEXT  = "you are different.";
  const REDIRECT_DELAY = 5000;
  const STORAGE_KEY   = "br_qr_unlocked";

  function updateClock() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('en-GB', { hour12: false });
  }
  setInterval(updateClock, 1000);
  updateClock();

  const logs = [
    "SIGNAL_ACQUIRED...", "DECRYPT_X64_CORE... OK",
    "WARNING: VOID_LOG_DETECTED", "LISTENING...",
    "ENCRYPT_LINK_ESTABLISHED", "DATA_FRAGMENT_RECOVERED"
  ];
  setInterval(() => {
    if (Math.random() > 0.8)
      document.getElementById('boot-msg').textContent =
        logs[Math.floor(Math.random() * logs.length)];
  }, 3000);

  document.getElementById('node').textContent =
    'NODE: ' + Math.random().toString(16).slice(2,8).toUpperCase();

  async function sha256(str) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
  }

  function typeWriter(text, id, speed = 200) {
    let i = 0;
    const el = document.getElementById(id);
    function type() {
      if (i < text.length) { el.textContent += text.charAt(i); i++; setTimeout(type, speed); }
    }
    type();
  }

  function unlockPiece(n) {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      if (!saved.includes(n)) { saved.push(n); localStorage.setItem(STORAGE_KEY, JSON.stringify(saved)); }
    } catch(e) {}
  }

  async function check() {
    const val  = document.getElementById('ans').value.trim().toUpperCase();
    const msg  = document.getElementById('msg');
    const hash = await sha256(val);

    if (hash === SOLUTION_HASH) {
      unlockPiece(PIECE_NUMBER);
      document.body.classList.add('glitch-flash');

      setTimeout(() => {
        document.getElementById('main-ui').style.display = 'none';
        document.getElementById('success').style.display = 'flex';
        document.body.classList.remove('glitch-flash');

        setTimeout(() => {
          typeWriter(SUCCESS_TEXT, "typewriter", 250);
          setTimeout(() => document.getElementById('piece-notice').classList.add('visible'), 1000);
          setTimeout(() => { window.location.href = NEXT_URL; }, REDIRECT_DELAY);
        }, 500);
      }, 500);

    } else {
      document.getElementById('ans').value = '';
      msg.style.color = '#5e1111';
      msg.textContent = '>> ERROR: UNAUTHORIZED_BREACH_DETECTED';
      setTimeout(() => { msg.textContent = ''; }, 2000);
    }
  }

  document.getElementById('ans').addEventListener('keydown', e => {
    if (e.key === 'Enter') check();
  });

  // ── Decode animation ──
  function startDecode(blockId, cipherText, plainText, initialDelay, charDelay) {
    initialDelay = initialDelay || 1200;
    charDelay = charDelay || 38;
    const block = document.getElementById(blockId);
    block.innerHTML = '';
    for (let i = 0; i < cipherText.length; i++) {
      if (cipherText[i] === '\n') {
        block.appendChild(document.createElement('br'));
      } else {
        const span = document.createElement('span');
        span.className = 'char';
        span.textContent = cipherText[i];
        span.dataset.plain = plainText[i] !== undefined ? plainText[i] : cipherText[i];
        block.appendChild(span);
      }
    }
    const spans = block.querySelectorAll('.char');
    let i = 0;
    function decodeNext() {
      if (i >= spans.length) return;
      const span = spans[i];
      span.classList.add('decoding');
      span.textContent = span.dataset.plain;
      setTimeout(function() {
        span.classList.remove('decoding');
        span.classList.add('decoded');
        i++;
        decodeNext();
      }, charDelay);
    }
    setTimeout(decodeNext, initialDelay);
  }

  


  /* ── DECODE ANIMATION ── */
  (function() {
    const CHAR_DELAY = 40;
    const cipher = "Rqh vwhs frpsohwh, wkh urdg lv orqj,\nWkh sdwk dkhdg lv kdug dqg zurqj.\nWzr qxpehuv klgh lq sodlq vljkw khuh,\nrqob vkdus plqgv zloo pdnh wkhp fohdu.\nWkhlu surgxfw lv wkh nhb brx qhhg,\nwklqn rxwvlgh wkh era wr surfhhg.";
    const plain  = "One step complete, the road is long,\nThe path ahead is hard and wrong.\nTwo numbers hide in plain sight here,\nonly sharp minds will make them clear.\nTheir product is the key you need,\nthink outside the box to proceed.";
    const block  = document.querySelector('.enigma-plain');
    if (!block) return;

    // Build spans from cipher text
    block.innerHTML = '';
    const spans = [];
    for (let i = 0; i < cipher.length; i++) {
      if (cipher[i] === '\n') {
        block.appendChild(document.createElement('br'));
      } else {
        const span = document.createElement('span');
        span.className = 'char';
        span.textContent = cipher[i];
        block.appendChild(span);
        spans.push({ span, target: plain[i] || cipher[i], isLetter: /[a-zA-Z]/.test(cipher[i]) });
      }
    }

    // Cursor
    const cur = document.createElement('span');
    cur.className = 'cursor';
    block.appendChild(cur);

    // Decode
    let i = 0;
    function decodeNext() {
      while (i < spans.length && !spans[i].isLetter) {
        spans[i].span.classList.add('decoded');
        i++;
      }
      if (i >= spans.length) return;
      const { span, target } = spans[i];
      span.classList.add('decoding');
      span.textContent = target;
      setTimeout(() => {
        span.classList.remove('decoding');
        span.classList.add('decoded');
        i++;
        setTimeout(decodeNext, CHAR_DELAY);
      }, CHAR_DELAY / 2);
    }
    setTimeout(decodeNext, 1000);
  })();


  function openImage() {
    const lb = document.getElementById('lightbox');
    const img = document.getElementById('lightbox-img');
    lb.classList.add('active');
    // trigger glitch after tiny delay
    img.classList.remove('glitch-reveal');
    void img.offsetWidth; // reflow
    img.classList.add('glitch-reveal');
    // after animation ends, keep image visible
    img.addEventListener('animationend', () => {
      img.style.opacity = 1;
      img.style.filter = 'brightness(0.8) contrast(1.1)';
    }, { once: true });
  
  }

  function closeImage() {
    document.getElementById('lightbox').classList.remove('active');
  }

  // Close on backdrop click
  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeImage();
  });

</script>


<!-- ── Lightbox overlay ── -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-caption">FILE_REF: ATTACH_001 // UNCLASSIFIED</div>
  <img class="lightbox-img" id="lightbox-img" src="assets/Good_Luck.png" alt="" />
  <div class="lightbox-actions">
    <a class="lb-btn" id="download-btn" href="assets/Good_Luck.png" download="ATTACH_001.png">>> DOWNLOAD_FILE</a>
    <button class="lb-btn" onclick="closeImage()">>> CLOSE</button>
  </div>
</div>

</body>
</html>
