<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TERMINAL_B.R.</title>
  <link rel="stylesheet" href="terminal.css">
  <style>
/* ── Lightbox ── */
    .lightbox {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 300;
      display: none;
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; padding: 30px;
    }
    .lightbox.active { display: flex; }

    .lightbox-img {
      max-width: 90vw; max-height: 65vh;
      object-fit: contain;
      border: 1px solid var(--dim);
      opacity: 0;
    }
    .lightbox-img.glitch-reveal {
      animation: lbGlitch 0.9s steps(1) forwards;
    }
    @keyframes lbGlitch {
      0%   { opacity: 0.1; filter: brightness(0) invert(1);        clip-path: inset(90% 0 0 0); }
      10%  { opacity: 0.5; filter: brightness(3) hue-rotate(90deg); clip-path: inset(70% 0 0 0); }
      20%  { opacity: 0.2; filter: brightness(0) invert(1);        clip-path: inset(50% 0 0 0); }
      35%  { opacity: 0.7; filter: brightness(2) sepia(1);         clip-path: inset(30% 0 0 0); }
      50%  { opacity: 0.4; filter: brightness(0) invert(1);        clip-path: inset(15% 0 0 0); }
      70%  { opacity: 0.9; filter: brightness(1.3);                clip-path: inset(5% 0 0 0);  }
      85%  { opacity: 1;   filter: brightness(0) invert(1);        clip-path: inset(0);         }
      100% { opacity: 1;   filter: brightness(0.8) contrast(1.1);  clip-path: inset(0);         }
    }

    .lightbox-caption {
      font-size: 9px; letter-spacing: 3px;
      color: var(--dim2); text-align: center;
    }
    .lightbox-actions { display: flex; gap: 12px; }

    .lb-btn {
      background: transparent;
      border: 1px solid var(--dim);
      color: var(--dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px; letter-spacing: 3px;
      padding: 8px 14px;
      cursor: crosshair; transition: all 0.4s;
      text-decoration: none; display: inline-block;
    }
    .lb-btn:hover {
      color: var(--primary); border-color: var(--primary);
      box-shadow: 0 0 10px var(--glow);
    }
  </style>
</head>
<body>

<div class="crt-overlay"></div>
<div class="scan-flash"></div>
<div class="vignette"></div>

<div class="wrap" id="main-ui">

  <div class="header">
    <span>FILE_ID: PUZZLE_02</span>
    <span id="clock">--:--:--</span>
  </div>

  <div class="boot-msg" id="boot-msg">SIGNAL_ACQUIRED...</div>
  <div class="section-label">> INTERCEPTED_TRANSMISSION</div>

  <div class="enigma-plain"></div>

  <!-- Pulsante per aprire l'immagine -->
  <button onclick="openImage()">>> OPEN_ATTACHED_FILE</button>

  <hr class="sep">

  <div class="input-area">
    <div class="input-row">
      <span class="prefix">></span>
      <input type="text" id="ans" placeholder="PASS" autocomplete="off" spellcheck="false" />
    </div>
    <button onclick="check()">VALIDATE_IDENTITY</button>
  </div>

  <div class="status-msg" id="msg"></div>

  <div class="signature">0168</div>

  <a class="qr-link" href="qr.html">[ VIEW_SIGNAL_PROGRESS ]</a>

  <div class="footer" style="opacity:0; animation: fadeIn 1s ease 2s forwards;">
    <span>KEY_ID: 0x0168</span>
    <span id="node">NODE: --</span>
  </div>

</div>

<!-- Success screen -->
<div class="success-screen" id="success">
  <div id="typewriter"></div>
  <div id="piece-notice">// FRAGMENT_02 SAVED //</div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-caption">FILE_REF: ATTACH_001 // UNCLASSIFIED</div>
  <img class="lightbox-img" id="lightbox-img" src="assets/Good_Luck.png" alt="" />
  <div class="lightbox-actions">
    <a class="lb-btn" href="assets/Good_Luck.png" download="ATTACH_001.png">>> DOWNLOAD_FILE</a>
    <button class="lb-btn" onclick="closeImage()">>> CLOSE</button>
  </div>
</div>

<script src="terminal.js"></script>
<script>
  /* ── Config enigma 2 ── */
  const PIECE_NUMBER   = 2;
  const SOLUTION_HASH  = "8d82487504e84435e074a7e13f2eb3969d908ecc243af6578e17ff7a9a01c13f";
  const NEXT_URL       = "enigma3.html";
  const SUCCESS_TEXT   = "you are different.";
  const REDIRECT_DELAY = 5000;

  startBootMsgLoop([
    "SIGNAL_ACQUIRED...", "DECRYPT_X64_CORE... OK",
    "WARNING: VOID_LOG_DETECTED", "LISTENING...",
    "ENCRYPT_LINK_ESTABLISHED", "DATA_FRAGMENT_RECOVERED"
  ]);

  runDecode(
    "Rqh vwhs frpsohwh, wkh urdg lv orqj,\nWkh sdwk dkhdg lv kdug dqg zurqj.\nWzr qxpehuv klgh lq sodlq vljkw khuh,\nrqob vkdus plqgv zloo pdnh wkhp fohdu.\nWkhlu surgxfw lv wkh nhb brx qhhg,\nwklqn rxwvlgh wkh era wr surfhhg.",
    "One step complete, the road is long,\nThe path ahead is hard and wrong.\nTwo numbers hide in plain sight here,\nonly sharp minds will make them clear.\nTheir product is the key you need,\nthink outside the box to proceed.",
    '.enigma-plain'
  );

  /* ── Lightbox ── */
  function openImage() {
    const lb  = document.getElementById('lightbox');
    const img = document.getElementById('lightbox-img');
    lb.classList.add('active');
    img.classList.remove('glitch-reveal');
    void img.offsetWidth;
    img.classList.add('glitch-reveal');
    img.addEventListener('animationend', () => {
      img.style.opacity = 1;
      img.style.filter  = 'brightness(0.8) contrast(1.1)';
    }, { once: true });
  }

  function closeImage() {
    document.getElementById('lightbox').classList.remove('active');
  }

  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeImage();
  });
</script>

</body>
</html>
